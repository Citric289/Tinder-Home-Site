# ─── Sveltia CMS configuration ───────────────────────────────────────────────
# This powers the no-code blog editor at /admin. It commits Markdown files to
# the GitHub repo; Vercel then auto-deploys the site. The GitHub login is handled
# by the serverless functions in /api (auth.js + callback.js). See ADMIN-SETUP.md.

backend:
  name: github
  repo: Citric289/tinder-home-site
  branch: main
  # base_url = your live site's origin (it serves the /api login functions).
  base_url: https://tinderhome.vercel.app
  auth_endpoint: api/auth

# Where uploaded photos are stored in the repo, and how they're referenced on
# the live site.
media_folder: "public/images/blog"
public_folder: "/images/blog"

# Used for the "View on site" links in the editor.
site_url: https://tinderhome.vercel.app

collections:
  - name: blog
    label: "Blog Posts"
    label_singular: "Blog Post"
    description: "Market Insights articles. Add, edit, or delete posts here."
    folder: "content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    preview_path: "#post/{{slug}}"
    summary: "{{title}}  ·  {{market}}  ·  {{date}}"
    sortable_fields: [date, title, market]
    fields:
      - { name: title, label: "Title", widget: string }
      - name: market
        label: "Market"
        widget: select
        options:
          - { label: "Chicago", value: chicago }
          - { label: "Florida", value: florida }
          - { label: "Both Markets", value: both }
        default: chicago
        hint: '"Both Markets" makes the post appear on the Chicago and Florida blogs.'
      - name: date
        label: "Date"
        widget: string
        hint: 'How it appears on the post, e.g. "April 2026".'
      - name: readMinutes
        label: "Read time (minutes)"
        widget: number
        value_type: int
        min: 1
        required: false
        hint: "Optional. Shown next to the date, e.g. 5 min read."
      - name: excerpt
        label: "Excerpt"
        widget: text
        hint: "One- or two-sentence summary shown on the blog card."
      - name: heroImage
        label: "Hero Image"
        widget: image
        hint: "The large image at the top of the post and on its card."
      - name: body
        label: "Article Body"
        widget: markdown
        hint: "The article itself. Use Heading 2 for section titles."

  # ─── Reviews ──────────────────────────────────────────────────────────────
  - name: reviews
    label: "Reviews"
    label_singular: "Review"
    description: "Client reviews shown in the 'What Clients Say' carousel. Add, edit, or delete reviews here."
    folder: "content/reviews"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    summary: "{{body}}"
    fields:
      - name: name
        label: "Client name"
        widget: string
        required: false
        hint: "Optional. Shown under the quote, e.g. 'The Johnson Family'. Leave blank to keep it anonymous."
      - name: rating
        label: "Star rating"
        widget: number
        value_type: int
        min: 1
        max: 5
        default: 5
        hint: "Number of gold stars (1–5)."
      - name: body
        label: "Review text"
        widget: text
        hint: "What the client said, in their words."

  # ─── Neighborhood Guides ──────────────────────────────────────────────────
  - name: neighborhoods
    label: "Neighborhood Guides"
    label_singular: "Neighborhood Guide"
    description: "Local-area guides. Each one is a full page with a photo and write-up. Add, edit, or delete them here."
    folder: "content/neighborhoods"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    preview_path: "#guide/{{slug}}"
    summary: "{{name}}  ·  {{market}}"
    sortable_fields: [order, name, market]
    fields:
      - name: name
        label: "Neighborhood name"
        widget: string
        hint: "The title, e.g. 'North Shore'."
      - name: market
        label: "Market"
        widget: select
        options:
          - { label: "Chicago", value: chicago }
          - { label: "Florida", value: florida }
          - { label: "Both Markets", value: both }
        default: chicago
        hint: 'Which page it appears on. "Both Markets" shows it on Chicago and Florida.'
      - name: order
        label: "Order"
        widget: number
        value_type: int
        min: 1
        default: 1
        hint: "Controls card order within a market (1 shows first)."
      - name: excerpt
        label: "Short description"
        widget: text
        hint: "One or two sentences shown on the card in the grid."
      - name: heroImage
        label: "Hero Image"
        widget: image
        hint: "The large photo at the top of the guide page."
      - name: body
        label: "Guide Body"
        widget: markdown
        hint: "The full write-up. Use Heading 2 for section titles."

  # ─── Site Settings ────────────────────────────────────────────────────────
  # Settings files (not lists of pages). Each one is a single editor screen that
  # lets Craig change copy, contact details, and per-market info without a
  # developer. Each file maps to a JSON file under content/site/.
  - name: site
    label: "Site Settings"
    description: "Editable text, numbers, contact details, and per-market info across the site."
    delete: false
    editor:
      preview: false
    files:
      # ── Homepage Numbers ──────────────────────────────────────────────────
      - name: stats
        label: "Homepage Numbers"
        file: "content/site/stats.json"
        description: "Edit the numbers in the hero banner and the About section."
        fields:
          - name: heroStats
            label: "Hero banner numbers"
            label_singular: "Stat"
            widget: list
            max: 3
            summary: "{{fields.value}} — {{fields.label}}"
            hint: "The three figures across the bottom of the top banner."
            fields:
              - { name: value, label: "Number", widget: string, hint: 'e.g. "$245M+" or "25 Years".' }
              - { name: label, label: "Caption", widget: string, hint: 'e.g. "In Real Estate Sales".' }
          - name: aboutStats
            label: "About-section numbers"
            label_singular: "Stat"
            widget: list
            max: 3
            summary: "{{fields.value}} — {{fields.label}}"
            hint: "The three figures in the 'About Craig' section."
            fields:
              - { name: value, label: "Number", widget: string, hint: 'e.g. "385+".' }
              - { name: label, label: "Caption", widget: string, hint: 'e.g. "Closed Transactions".' }

      # ── Markets (Chicago & Florida) ───────────────────────────────────────
      - name: markets
        label: "Markets (Chicago & Florida)"
        file: "content/site/markets.json"
        description: "Per-market details — taglines, hero photo, brokerage, email, phone, and the form each market submits to."
        fields:
          - { name: selectPrompt, label: "Landing page prompt", widget: string, hint: 'The small text on the two-panel opening screen, e.g. "Select a Market".' }
          - name: chicago
            label: "Chicago Market"
            widget: object
            collapsed: true
            fields:
              - { name: name, label: "Market name", widget: string, hint: 'Short label used in a few sentences, e.g. "Chicago".' }
              - { name: brokerage, label: "Brokerage name", widget: string, hint: 'e.g. "@properties". Shown as alt text for the logo.' }
              - { name: location, label: "Location / office", widget: string, hint: 'e.g. "Greater Chicago Area". Shown in the hero, contact, and footer.' }
              - { name: email, label: "Email address", widget: string }
              - { name: phone, label: "Phone number", widget: string, required: false, hint: "Shown in the Contact section. Leave blank to hide the phone row." }
              - { name: taglineL1, label: "Hero headline — line 1", widget: string }
              - { name: taglineL2, label: "Hero headline — line 2", widget: string }
              - { name: heroSubtitle, label: "Hero subtitle", widget: text, hint: "The sentence under the big hero headline." }
              - { name: heroImage, label: "Hero / landing photo", widget: image, hint: "The full-screen background photo for this market (also used on the opening split screen)." }
              - { name: landingLabel, label: "Opening-screen title", widget: string, hint: 'The big title on this market’s panel of the opening screen, e.g. "Chicago Suburbs".' }
              - { name: landingSub, label: "Opening-screen subtitle", widget: string, hint: 'The small caption above that title, e.g. "Greater Chicago Area".' }
              - { name: articleEyebrow, label: "Article eyebrow", widget: string, hint: 'Small label above blog-post titles in this market, e.g. "Chicago Intelligence".' }
              - { name: logo, label: "Brokerage logo", widget: image, required: false, hint: "The brokerage logo shown in the footer (Blake / @properties). Click it to upload a replacement — a transparent PNG looks best." }
              - name: logoShape
                label: "Logo shape"
                widget: select
                options:
                  - { label: "Wide (horizontal)", value: wide }
                  - { label: "Square", value: square }
                default: wide
                hint: "Controls how the logo is sized in the footer."
              - { name: valuationForm, label: "Valuation form URL", widget: string, hint: "Formspree endpoint the home-valuation form submits to." }
              - { name: contactForm, label: "Contact form URL", widget: string, hint: "Formspree endpoint the contact form submits to." }
          - name: florida
            label: "Florida Market"
            widget: object
            collapsed: true
            fields:
              - { name: name, label: "Market name", widget: string, hint: 'Short label used in a few sentences, e.g. "Florida".' }
              - { name: brokerage, label: "Brokerage name", widget: string, hint: 'e.g. "Blake Real Estate". Shown as alt text for the logo.' }
              - { name: location, label: "Location / office", widget: string, hint: 'e.g. "Clearwater Area, FL". Shown in the hero, contact, and footer.' }
              - { name: email, label: "Email address", widget: string }
              - { name: phone, label: "Phone number", widget: string, required: false, hint: "Shown in the Contact section. Leave blank to hide the phone row." }
              - { name: taglineL1, label: "Hero headline — line 1", widget: string }
              - { name: taglineL2, label: "Hero headline — line 2", widget: string }
              - { name: heroSubtitle, label: "Hero subtitle", widget: text, hint: "The sentence under the big hero headline." }
              - { name: heroImage, label: "Hero / landing photo", widget: image, hint: "The full-screen background photo for this market (also used on the opening split screen)." }
              - { name: landingLabel, label: "Opening-screen title", widget: string, hint: 'The big title on this market’s panel of the opening screen, e.g. "Gulf Coast Florida".' }
              - { name: landingSub, label: "Opening-screen subtitle", widget: string, hint: 'The small caption above that title, e.g. "Clearwater Area, FL".' }
              - { name: articleEyebrow, label: "Article eyebrow", widget: string, hint: 'Small label above blog-post titles in this market, e.g. "Gulf Coast Intelligence".' }
              - { name: logo, label: "Brokerage logo", widget: image, required: false, hint: "The brokerage logo shown in the footer (Blake / @properties). Click it to upload a replacement — a transparent PNG looks best." }
              - name: logoShape
                label: "Logo shape"
                widget: select
                options:
                  - { label: "Wide (horizontal)", value: wide }
                  - { label: "Square", value: square }
                default: square
                hint: "Controls how the logo is sized in the footer."
              - { name: valuationForm, label: "Valuation form URL", widget: string, hint: "Formspree endpoint the home-valuation form submits to." }
              - { name: contactForm, label: "Contact form URL", widget: string, hint: "Formspree endpoint the contact form submits to." }

      # ── About Section ─────────────────────────────────────────────────────
      - name: about
        label: "About Craig"
        file: "content/site/about.json"
        description: "The 'About Craig' section, plus Craig's photo and the author bio shown at the bottom of every article and guide."
        fields:
          - { name: eyebrow, label: "Eyebrow", widget: string, hint: 'Small label above the heading, e.g. "About Craig".' }
          - { name: heading, label: "Heading", widget: string, hint: 'e.g. "A Different Kind of Agent".' }
          - { name: photo, label: "Craig's photo (optional)", widget: image, required: false, hint: "Leave blank to keep the built-in headshot. Used in the About section and article author bios." }
          - name: paragraphs
            label: "Bio paragraphs"
            label_singular: "Paragraph"
            widget: list
            field: { name: paragraph, label: "Paragraph", widget: text }
            hint: "One or more paragraphs of bio copy."
          - name: credentials
            label: "Credentials & recognition"
            label_singular: "Item"
            widget: list
            summary: "{{fields.label}}: {{fields.value}}"
            hint: "The two lists at the bottom of the About section."
            fields:
              - { name: label, label: "Label", widget: string, hint: 'e.g. "Designations" or "Recognition".' }
              - { name: value, label: "Value", widget: string, hint: 'e.g. "CRS  ·  CNE  ·  Luxury Properties Specialist".' }
          - { name: authorName, label: "Author name", widget: string, hint: "Shown in the author bio at the bottom of every article and guide." }
          - { name: authorBio, label: "Author bio", widget: text, hint: "Short bio paragraph in the author block under each article and guide." }
          - { name: authorCtaLabel, label: "Author button label", widget: string, hint: 'The button in the author block, e.g. "Work With Craig".' }

      # ── Section Headings & Copy ───────────────────────────────────────────
      - name: sections
        label: "Section Headings & Copy"
        file: "content/site/sections.json"
        description: "The titles and intro text for each section of the homepage, plus the valuation and contact form copy."
        fields:
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - { name: contactButton, label: "Hero button label", widget: string, hint: 'The button on the opening hero, e.g. "Contact Craig".' }
          - name: neighborhoods
            label: "Neighborhoods section"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: intro, label: "Intro sentence", widget: text, hint: 'Use {area} where the market name should appear, e.g. "...in the {area} area."' }
              - { name: guideEyebrow, label: "Guide page eyebrow", widget: string, hint: "Small label at the top of each full guide page." }
              - { name: moreEyebrow, label: '"More" eyebrow', widget: string, hint: "Above the related-guides grid at the bottom of a guide." }
              - { name: moreHeading, label: '"More" heading', widget: string }
          - name: testimonials
            label: "Testimonials section"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
          - name: blog
            label: "Blog section"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: intro, label: "Intro sentence", widget: text }
              - { name: moreEyebrow, label: '"More" eyebrow', widget: string, hint: "Above the related-articles grid at the bottom of a post." }
              - { name: moreHeading, label: '"More" heading', widget: string }
          - name: valuation
            label: "Home Valuation section"
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: intro, label: "Intro paragraph", widget: text }
              - { name: button, label: "Button label", widget: string }
              - { name: successHeading, label: "After-submit heading", widget: string, hint: "Shown once the form is sent." }
              - { name: successBody, label: "After-submit message", widget: text }
          - name: contact
            label: "Contact section"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: intro, label: "Intro paragraph", widget: text }
              - { name: messagePlaceholder, label: "Message box placeholder", widget: string }
              - { name: successHeading, label: "After-submit heading", widget: string }
              - { name: successBody, label: "After-submit message", widget: text, hint: "Use {email} where Craig's email address should appear." }
              - { name: intentPlaceholder, label: "Dropdown placeholder", widget: string, hint: 'The first, unselected option, e.g. "How can Craig help?".' }
              - name: intentOptions
                label: "Dropdown choices"
                label_singular: "Choice"
                widget: list
                field: { name: option, label: "Choice", widget: string }
                hint: "The selectable options in the 'How can Craig help?' dropdown."

      # ── Contact Details, Social & Footer ──────────────────────────────────
      - name: contact
        label: "Social Links & Footer"
        file: "content/site/contact.json"
        description: "Social media links (used in the contact section and footer) and the footer brand name and copyright."
        fields:
          - { name: footerName, label: "Footer name", widget: string, hint: 'The brand name in the footer, e.g. "Craig Tinder".' }
          - { name: copyright, label: "Copyright line", widget: string }
          - name: social
            label: "Social links"
            widget: object
            hint: "Leave any field blank to hide that icon."
            fields:
              - { name: linkedin, label: "LinkedIn URL", widget: string, required: false }
              - { name: instagram, label: "Instagram URL", widget: string, required: false }
              - { name: facebook, label: "Facebook URL", widget: string, required: false }
